name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Soma Scratchpad ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false

      - name: Rename artifacts and create portable zip
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $label = "Soma_Scratchpad_${version}_Windows"

          # Publish the draft release so all gh commands work without --draft
          gh release edit $tag --draft=false

          # Now work with the published release
          $releaseJson = gh release view $tag --json id,assets | ConvertFrom-Json
          $releaseId = $releaseJson.id

          # Download all assets
          $downloadDir = "${{ runner.temp }}/release-assets"
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          gh release download $tag --dir $downloadDir --clobber

          # Rename MSI and NSIS, keep updater artifacts as-is
          $renamedAssets = @()
          $updaterAssets = @()
          foreach ($asset in $releaseJson.assets) {
            $name = $asset.name
            $newName = $null

            if ($name -match '\.msi$') {
              $newName = "${label}.msi"
            } elseif ($name -match '-setup\.exe$' -or $name -match '\.exe$' -and $name -notmatch 'updater') {
              $newName = "${label}.exe"
            } elseif ($name -match '^(latest\.json|.*\.tar\.gz(\.sig)?)$') {
              $updaterAssets += $name
              Write-Host "Keeping updater artifact: $name"
            }

            if ($newName) {
              Copy-Item "$downloadDir/$name" "$downloadDir/$newName" -Force
              $renamedAssets += @{ old = $name; new = $newName }
              Write-Host "Rename: $name -> $newName"
            }
          }

          # Update latest.json URLs to match renamed assets
          $latestJsonPath = "$downloadDir/latest.json"
          if (Test-Path $latestJsonPath) {
            $latestJson = Get-Content $latestJsonPath -Raw | ConvertFrom-Json
            foreach ($item in $renamedAssets) {
              if ($item.old -and $item.new) {
                foreach ($platform in $latestJson.platforms.PSObject.Properties) {
                  if ($platform.Value.url -match [regex]::Escape($item.old)) {
                    $oldUrl = $platform.Value.url
                    $newUrl = $oldUrl -replace [regex]::Escape($item.old), $item.new
                    $platform.Value.url = $newUrl
                    Write-Host "Updated URL: $oldUrl -> $newUrl"
                  }
                }
              }
            }
            $latestJson | ConvertTo-Json -Depth 10 | Set-Content $latestJsonPath -Encoding UTF8
            Write-Host "Updated latest.json with renamed asset URLs"
            # Re-upload updated latest.json
            gh release upload $tag $latestJsonPath --clobber
            Write-Host "Re-uploaded updated latest.json"
          }

          # Create portable zip from release exe
          $releaseExe = "src-tauri/target/release/soma-scratchpad.exe"
          if (Test-Path $releaseExe) {
            $portableDir = "${{ runner.temp }}/portable"
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $releaseExe "$portableDir/soma-scratchpad.exe"

            $iconsDir = "src-tauri/target/release/icons"
            if (Test-Path $iconsDir) {
              Copy-Item -Recurse $iconsDir "$portableDir/icons"
            }

            $portableZip = "${label}_Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath "$downloadDir/$portableZip" -Force
            $renamedAssets += @{ old = $null; new = $portableZip }
            Write-Host "Created portable zip: $portableZip"
          } else {
            Write-Warning "Release exe not found at $releaseExe, skipping portable zip"
          }

          # Delete old assets (except updater artifacts) and upload renamed ones
          foreach ($asset in $releaseJson.assets) {
            if ($updaterAssets -contains $asset.name) {
              Write-Host "Skipping updater artifact: $($asset.name)"
              continue
            }
            Write-Host "Deleting old asset: $($asset.name)"
            gh release delete-asset $tag $asset.name --yes
          }

          # Upload all new assets
          foreach ($item in $renamedAssets) {
            $path = "$downloadDir/$($item.new)"
            if (Test-Path $path) {
              Write-Host "Uploading: $($item.new)"
              gh release upload $tag $path --clobber
            }
          }

          Write-Host "Done. Release assets updated."

      - name: Smoke check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $expectedPrefix = "Soma_Scratchpad_${version}_Windows"

          Write-Host "=== Smoke Check ==="

          # 1. Download latest.json
          $latestJsonPath = "${{ runner.temp }}/latest.json"
          gh release download $tag --pattern latest.json --dir "${{ runner.temp }}" --clobber
          if (-not (Test-Path $latestJsonPath)) {
            Write-Error "latest.json not found in release assets"
            exit 1
          }
          $latestJson = Get-Content $latestJsonPath -Raw | ConvertFrom-Json
          Write-Host "1. latest.json downloaded"

          # 2. Verify version == tag.version
          if ($latestJson.version -ne $version) {
            Write-Error "Version mismatch: latest.json=$($latestJson.version) vs tag=$version"
            exit 1
          }
          Write-Host "2. version matches: $version"

          # 3. Verify platforms.windows-x86_64.url is accessible
          $url = $latestJson.platforms.'windows-x86_64'.url
          if (-not $url) {
            Write-Error "platforms.windows-x86_64.url is missing in latest.json"
            exit 1
          }
          try {
            $response = Invoke-WebRequest -Uri $url -Method Head -UseBasicParsing -TimeoutSec 30
            if ($response.StatusCode -ne 200) {
              Write-Error "Asset URL returned HTTP $($response.StatusCode): $url"
              exit 1
            }
            Write-Host "3. asset URL accessible (HTTP 200): $url"
          } catch {
            Write-Error "Asset URL not reachable: $url`n$($_.Exception.Message)"
            exit 1
          }

          # 4. Verify signature field exists
          # Note: URL changes invalidate the original signature. Re-signing requires
          # npx tauri signer sign, which we need to fix in a follow-up.
          if (-not $latestJson.signature) {
            Write-Error "signature field missing or empty in latest.json"
            exit 1
          }
          Write-Host "4. signature present ($($latestJson.signature.Length) chars) -- note: may be stale due to URL changes"

          # 5. Verify release asset names match convention
          $assets = gh release view $tag --json assets --jq '.assets[].name'
          $badAssets = @()
          foreach ($asset in $assets) {
            if ($asset -eq 'latest.json' -or $asset -match '\.tar\.gz(\.sig)?$') { continue }
            if ($asset -notmatch [regex]::Escape($expectedPrefix)) {
              $badAssets += $asset
              Write-Warning "   MISMATCH: '$asset' does not match prefix '$expectedPrefix'"
            }
          }
          if ($badAssets.Count -gt 0) {
            Write-Error "Found $($badAssets.Count) asset(s) not following naming convention: $($badAssets -join ', ')"
            exit 1
          }
          Write-Host "5. all asset names follow convention: $expectedPrefix"

          Write-Host "=== Smoke Check PASSED ==="
